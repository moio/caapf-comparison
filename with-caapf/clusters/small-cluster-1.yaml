apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: small-cluster-1
  namespace: default
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
    cloud-provider: aws
    csi: aws-ebs-csi-driver
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.0.0/16
  topology:
    class: aws-rke2-small
    version: v1.30.4+rke2r1
    variables:
      - name: sshKeyName
        value: my-aws-keypair
    workers:
      machineDeployments:
        - class: default-worker
          name: md-0
          replicas: 2
