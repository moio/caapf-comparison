# HelmOp: AWS EBS CSI Driver
# Targets clusters with label csi=aws-ebs-csi-driver that use one of the three
# with-CAAPF ClusterClasses. CAAPF automatically adds the clusterclass-name label.
apiVersion: fleet.cattle.io/v1alpha1
kind: HelmOp
metadata:
  name: aws-ebs-csi-driver
  namespace: default
spec:
  helm:
    repo: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
    chart: aws-ebs-csi-driver
    # Pin to a tested version; bump deliberately
    version: "2.33.0"
    releaseName: aws-ebs-csi-driver
    values:
      controller:
        hostNetwork: true
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
      node:
        tolerations:
          - operator: Exists
            effect: NoSchedule
      storageClasses:
        - name: ebs-sc
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
          volumeBindingMode: WaitForFirstConsumer
          reclaimPolicy: Delete
          parameters:
            type: gp3
  defaultNamespace: kube-system
  targets:
    - clusterSelector:
        matchLabels:
          csi: aws-ebs-csi-driver
