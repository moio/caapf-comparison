# HelmOp: AWS Cloud Controller Manager
# Targets clusters with label cloud-provider=aws that use one of the three
# with-CAAPF ClusterClasses. CAAPF automatically adds the clusterclass-name label.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: aws-cloud-controller-manager
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      cloud-provider: aws
  repoURL: https://kubernetes.github.io/cloud-provider-aws
  chartName: aws-cloud-controller-manager
  # Pin to a tested version; bump deliberately
  version: "0.0.8"
  releaseName: aws-cloud-controller-manager
  namespace: kube-system
  valuesTemplate: |
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - key: node.cloudprovider.kubernetes.io/uninitialized
        value: "true"
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
    args:
      - --v=2
      - --cloud-provider=aws
      - --configure-cloud-routes=false
    hostNetworking: true
