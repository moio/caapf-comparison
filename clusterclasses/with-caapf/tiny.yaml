# ClusterClass: aws-rke2-tiny
# Size: 1x t3.medium CP, 1x t3.medium worker, 30 GiB root volumes
# Addon delivery: CAAPF HelmOp (no manifestsConfigMapReference)
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: aws-rke2-tiny
spec:
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSClusterTemplate
      name: aws-rke2-tiny-cluster
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: RKE2ControlPlaneTemplate
      name: aws-rke2-tiny-cp
    machineInfrastructure:
      ref:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: aws-rke2-tiny-cp-machine
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: RKE2ConfigTemplate
              name: aws-rke2-tiny-worker-bootstrap
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
              kind: AWSMachineTemplate
              name: aws-rke2-tiny-worker-machine
  variables:
    - name: region
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: us-east-1
    - name: sshKeyName
      required: true
      schema:
        openAPIV3Schema:
          type: string
    - name: awsClusterIdentityName
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: cluster-identity
    - name: amiID
      required: false
      schema:
        openAPIV3Schema:
          type: string
          # openSUSE Leap 15.6 official AMI in us-east-1 (update when stale)
          default: ami-095197d9bbe1d2fb3
  patches:
    - name: region
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/region
              valueFrom:
                variable: region
    - name: sshKeyName
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
    - name: awsClusterIdentityName
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/identityRef/name
              valueFrom:
                variable: awsClusterIdentityName
    - name: amiID
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
    - name: controlPlaneInfraRef
      description: >-
        Syncs the RKE2ControlPlane .spec.infrastructureRef to point at the
        topology-generated AWSMachineTemplate so the RKE2 CP controller
        (v0.9.x) clones the patched template, not the original.
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta1
            kind: RKE2ControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/infrastructureRef/name
              valueFrom:
                variable: builtin.controlPlane.machineTemplate.infrastructureRef.name
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterTemplate
metadata:
  name: aws-rke2-tiny-cluster
spec:
  template:
    spec:
      region: us-east-1
      identityRef:
        kind: AWSClusterStaticIdentity
        name: cluster-identity
      network:
        vpc:
          availabilityZoneUsageLimit: 1
        cni:
          cniIngressRules:
            # Canal CNI (VXLAN)
            - description: Canal VXLAN
              fromPort: 8472
              protocol: udp
              toPort: 8472
            # Canal CNI (Typha)
            - description: Canal Typha
              fromPort: 5473
              protocol: tcp
              toPort: 5473
            # RKE2 supervisor — workers join via NLB:9345; CP SG must allow it
            - description: RKE2 supervisor
              fromPort: 9345
              protocol: tcp
              toPort: 9345
      controlPlaneLoadBalancer:
        loadBalancerType: nlb
        additionalListeners:
          - port: 9345
            protocol: TCP
        ingressRules:
          - description: RKE2 supervisor
            fromPort: 9345
            protocol: tcp
            toPort: 9345
            cidrBlocks:
              - "0.0.0.0/0"
          - description: Kubernetes API
            fromPort: 6443
            protocol: tcp
            toPort: 6443
            cidrBlocks:
              - "0.0.0.0/0"
          - description: etcd peer
            fromPort: 2380
            protocol: tcp
            toPort: 2380
          - description: etcd client
            fromPort: 2379
            protocol: tcp
            toPort: 2379
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: RKE2ControlPlaneTemplate
metadata:
  name: aws-rke2-tiny-cp
spec:
  template:
    spec:
      replicas: 1
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
      serverConfig:
        cloudProviderName: external
        cni: canal
        etcd:
          backupConfig:
            enableAutomaticSnapshots: true
            snapshotRetention: 5
            snapshotScheduleCron: "0 */6 * * *"
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
      preRKE2Commands:
        - |
          hostnamectl set-hostname "$(curl -s http://169.254.169.254/latest/meta-data/local-hostname)"
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: aws-rke2-tiny-cp-machine
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-tiny-cp-machine
spec:
  template:
    spec:
      instanceType: t3.medium
      sshKeyName: placeholder   # overridden by patch
      ami:
        id: ami-095197d9bbe1d2fb3   # overridden by patch
      rootVolume:
        size: 30
      iamInstanceProfile: control-plane.cluster-api-provider-aws.sigs.k8s.io
      cloudInit:
        insecureSkipSecretsManager: false
      nonRootVolumes: []
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-tiny-worker-machine
spec:
  template:
    spec:
      instanceType: t3.medium
      sshKeyName: placeholder   # overridden by patch
      ami:
        id: ami-095197d9bbe1d2fb3   # overridden by patch
      rootVolume:
        size: 30
      iamInstanceProfile: nodes.cluster-api-provider-aws.sigs.k8s.io
      cloudInit:
        insecureSkipSecretsManager: false
      nonRootVolumes: []
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: RKE2ConfigTemplate
metadata:
  name: aws-rke2-tiny-worker-bootstrap
spec:
  template:
    spec:
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
      preRKE2Commands:
        - |
          hostnamectl set-hostname "$(curl -s http://169.254.169.254/latest/meta-data/local-hostname)"
