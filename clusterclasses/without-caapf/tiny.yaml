# ClusterClass: aws-rke2-tiny-no-caapf
# Size: 1x t3.medium CP, 1x t3.medium worker, 30 GiB root volumes
# Addon delivery: manifestsConfigMapReference (CCM) + ClusterResourceSet (CSI)
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: aws-rke2-tiny-no-caapf
spec:
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSClusterTemplate
      name: aws-rke2-tiny-no-caapf-cluster
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: RKE2ControlPlaneTemplate
      name: aws-rke2-tiny-no-caapf-cp
    machineInfrastructure:
      ref:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: aws-rke2-tiny-no-caapf-cp-machine
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: RKE2ConfigTemplate
              name: aws-rke2-tiny-no-caapf-worker-bootstrap
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
              kind: AWSMachineTemplate
              name: aws-rke2-tiny-no-caapf-worker-machine
  variables:
    - name: region
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: eu-central-1
    - name: sshKeyName
      required: true
      schema:
        openAPIV3Schema:
          type: string
    - name: awsClusterIdentityName
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: cluster-identity
    - name: amiID
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: ami-0a23a9827c6dab833
  patches:
    - name: region
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/region
              valueFrom:
                variable: region
    - name: sshKeyName
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
    - name: awsClusterIdentityName
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/identityRef/name
              valueFrom:
                variable: awsClusterIdentityName
    - name: amiID
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterTemplate
metadata:
  name: aws-rke2-tiny-no-caapf-cluster
spec:
  template:
    spec:
      region: eu-central-1
      identityRef:
        kind: AWSClusterStaticIdentity
        name: cluster-identity
      network:
        vpc:
          availabilityZoneUsageLimit: 1
        cni:
          cniIngressRules:
            - description: Canal VXLAN
              fromPort: 8472
              protocol: udp
              toPort: 8472
            - description: Canal Typha
              fromPort: 5473
              protocol: tcp
              toPort: 5473
      controlPlaneLoadBalancer:
        loadBalancerType: nlb
        ingressRules:
          - description: RKE2 supervisor
            fromPort: 9345
            protocol: tcp
            toPort: 9345
          - description: Kubernetes API
            fromPort: 6443
            protocol: tcp
            toPort: 6443
          - description: etcd peer
            fromPort: 2380
            protocol: tcp
            toPort: 2380
          - description: etcd client
            fromPort: 2379
            protocol: tcp
            toPort: 2379
---
# KEY DIFFERENCE from with-caapf variant:
# manifestsConfigMapReference points to aws-ccm-manifests ConfigMap which contains
# the full AWS CCM manifest set. RKE2 copies these to /var/lib/rancher/rke2/server/manifests/
# on control-plane nodes and auto-deploys them cluster-wide.
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: RKE2ControlPlaneTemplate
metadata:
  name: aws-rke2-tiny-no-caapf-cp
spec:
  template:
    spec:
      replicas: 1
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
      serverConfig:
        cloudProviderName: external
        cni: canal
        etcd:
          backupConfig:
            enableAutomaticSnapshots: true
            snapshotRetention: 5
            snapshotScheduleCron: "0 */6 * * *"
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
      manifestsConfigMapReference:
        name: aws-ccm-manifests
        namespace: default
      preRKE2Commands:
        - |
          hostnamectl set-hostname "$(curl -s http://169.254.169.254/latest/meta-data/local-hostname)"
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: aws-rke2-tiny-no-caapf-cp-machine
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-tiny-no-caapf-cp-machine
spec:
  template:
    spec:
      instanceType: t3.medium
      sshKeyName: placeholder
      ami:
        id: ami-0a23a9827c6dab833
      rootVolume:
        size: 30
      iamInstanceProfile: control-plane.cluster-api-provider-aws.sigs.k8s.io
      cloudInit:
        insecureSkipSecretsManager: false
      nonRootVolumes: []
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-tiny-no-caapf-worker-machine
spec:
  template:
    spec:
      instanceType: t3.medium
      sshKeyName: placeholder
      ami:
        id: ami-0a23a9827c6dab833
      rootVolume:
        size: 30
      iamInstanceProfile: nodes.cluster-api-provider-aws.sigs.k8s.io
      cloudInit:
        insecureSkipSecretsManager: false
      nonRootVolumes: []
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: RKE2ConfigTemplate
metadata:
  name: aws-rke2-tiny-no-caapf-worker-bootstrap
spec:
  template:
    spec:
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
      preRKE2Commands:
        - |
          hostnamectl set-hostname "$(curl -s http://169.254.169.254/latest/meta-data/local-hostname)"
