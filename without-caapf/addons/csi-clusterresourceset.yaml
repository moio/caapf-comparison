# ConfigMap + ClusterResourceSet: AWS EBS CSI Driver
#
# The ClusterResourceSet targets clusters with label csi=external.
# strategy: ApplyOnce means it is deployed exactly once per cluster - no continuous
# reconciliation. This is the key behavioral difference from CAAPF HelmOps.
#
# NOTE: Both resources must be in the same namespace as the Cluster (default).
# NOTE: Requires clusterResourceSet: true on the CAPA CAPIProvider (set in capi-providers.yaml).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-ebs-csi-driver-manifests
  namespace: default
data:
  # CSIDriver object
  csidriver.yaml: |
    apiVersion: storage.k8s.io/v1
    kind: CSIDriver
    metadata:
      name: ebs.csi.aws.com
    spec:
      attachRequired: true
      podInfoOnMount: false
      fsGroupPolicy: File
  # Controller ServiceAccount
  controller-sa.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: ebs-csi-controller-sa
      namespace: kube-system
  # Node ServiceAccount
  node-sa.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: ebs-csi-node-sa
      namespace: kube-system
  # ClusterRole for controller
  controller-clusterrole.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: ebs-csi-controller-role
    rules:
      - apiGroups: [""]
        resources: [nodes, pods]
        verbs: [get, list, watch]
      - apiGroups: [""]
        resources: [events]
        verbs: [create, patch]
      - apiGroups: [""]
        resources: [persistentvolumes]
        verbs: [create, delete, get, list, watch, update, patch]
      - apiGroups: [""]
        resources: [persistentvolumeclaims]
        verbs: [get, list, watch, update]
      - apiGroups: [""]
        resources: [persistentvolumeclaims/status]
        verbs: [update, patch]
      - apiGroups: [storage.k8s.io]
        resources: [storageclasses]
        verbs: [get, list, watch]
      - apiGroups: [storage.k8s.io]
        resources: [csinodes]
        verbs: [get, list, watch]
      - apiGroups: [storage.k8s.io]
        resources: [volumeattachments]
        verbs: [get, list, watch, update, patch]
      - apiGroups: [storage.k8s.io]
        resources: [volumeattachments/status]
        verbs: [patch]
      - apiGroups: [snapshot.storage.k8s.io]
        resources: [volumesnapshots]
        verbs: [get, list]
      - apiGroups: [snapshot.storage.k8s.io]
        resources: [volumesnapshotcontents]
        verbs: [create, get, list, watch, update, delete, patch]
      - apiGroups: [snapshot.storage.k8s.io]
        resources: [volumesnapshotclasses]
        verbs: [get, list, watch]
      - apiGroups: [snapshot.storage.k8s.io]
        resources: [volumesnapshotcontents/status]
        verbs: [update, patch]
      - apiGroups: [""]
        resources: [secrets]
        verbs: [get, list]
      - apiGroups: [coordination.k8s.io]
        resources: [leases]
        verbs: [get, watch, list, delete, update, create]
  # ClusterRoleBinding for controller
  controller-clusterrolebinding.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: ebs-csi-controller-binding
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: ebs-csi-controller-role
    subjects:
      - kind: ServiceAccount
        name: ebs-csi-controller-sa
        namespace: kube-system
  # ClusterRole for node
  node-clusterrole.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: ebs-csi-node-role
    rules:
      - apiGroups: [""]
        resources: [nodes]
        verbs: [get, list, watch]
  # ClusterRoleBinding for node
  node-clusterrolebinding.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: ebs-csi-node-binding
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: ebs-csi-node-role
    subjects:
      - kind: ServiceAccount
        name: ebs-csi-node-sa
        namespace: kube-system
  # Controller Deployment
  controller-deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ebs-csi-controller
      namespace: kube-system
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: ebs-csi-controller
      template:
        metadata:
          labels:
            app: ebs-csi-controller
        spec:
          nodeSelector:
            kubernetes.io/os: linux
          serviceAccountName: ebs-csi-controller-sa
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
          hostNetwork: true
          containers:
            - name: ebs-plugin
              image: public.ecr.aws/ebs-csi-driver/aws-ebs-csi-driver:v1.31.0
              args:
                - controller
                - --endpoint=$(CSI_ENDPOINT)
                - --logging-format=text
                - --v=2
              env:
                - name: CSI_ENDPOINT
                  value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
              ports:
                - name: healthz
                  containerPort: 9808
                  protocol: TCP
            - name: csi-provisioner
              image: public.ecr.aws/eks-distro/kubernetes-csi/external-provisioner:v4.0.1-eks-1-29-11
              args:
                - --csi-address=$(ADDRESS)
                - --v=2
                - --feature-gates=Topology=true
                - --leader-election=true
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
            - name: csi-attacher
              image: public.ecr.aws/eks-distro/kubernetes-csi/external-attacher:v4.6.1-eks-1-29-11
              args:
                - --csi-address=$(ADDRESS)
                - --v=2
                - --leader-election=true
              env:
                - name: ADDRESS
                  value: /var/lib/csi/sockets/pluginproxy/csi.sock
              volumeMounts:
                - name: socket-dir
                  mountPath: /var/lib/csi/sockets/pluginproxy/
          volumes:
            - name: socket-dir
              emptyDir: {}
  # Node DaemonSet
  node-daemonset.yaml: |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: ebs-csi-node
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          app: ebs-csi-node
      updateStrategy:
        type: RollingUpdate
      template:
        metadata:
          labels:
            app: ebs-csi-node
        spec:
          nodeSelector:
            kubernetes.io/os: linux
          serviceAccountName: ebs-csi-node-sa
          tolerations:
            - operator: Exists
              effect: NoSchedule
          containers:
            - name: ebs-plugin
              image: public.ecr.aws/ebs-csi-driver/aws-ebs-csi-driver:v1.31.0
              args:
                - node
                - --endpoint=$(CSI_ENDPOINT)
                - --logging-format=text
                - --v=2
              env:
                - name: CSI_ENDPOINT
                  value: unix:/csi/csi.sock
              volumeMounts:
                - name: kubelet-dir
                  mountPath: /var/lib/kubelet
                  mountPropagation: Bidirectional
                - name: plugin-dir
                  mountPath: /csi
                - name: device-dir
                  mountPath: /dev
              securityContext:
                privileged: true
            - name: node-driver-registrar
              image: public.ecr.aws/eks-distro/kubernetes-csi/node-driver-registrar:v2.10.1-eks-1-29-11
              args:
                - --csi-address=$(ADDRESS)
                - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
                - --v=2
              env:
                - name: ADDRESS
                  value: /csi/csi.sock
                - name: DRIVER_REG_SOCK_PATH
                  value: /var/lib/kubelet/plugins/ebs.csi.aws.com/csi.sock
              volumeMounts:
                - name: plugin-dir
                  mountPath: /csi
                - name: registration-dir
                  mountPath: /registration
          volumes:
            - name: kubelet-dir
              hostPath:
                path: /var/lib/kubelet
                type: Directory
            - name: plugin-dir
              hostPath:
                path: /var/lib/kubelet/plugins/ebs.csi.aws.com/
                type: DirectoryOrCreate
            - name: registration-dir
              hostPath:
                path: /var/lib/kubelet/plugins_registry/
                type: Directory
            - name: device-dir
              hostPath:
                path: /dev
                type: Directory
  # Default gp3 StorageClass
  storageclass.yaml: |
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: ebs-sc
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: ebs.csi.aws.com
    volumeBindingMode: WaitForFirstConsumer
    reclaimPolicy: Delete
    parameters:
      type: gp3
  # PodDisruptionBudget for controller
  pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: ebs-csi-controller
      namespace: kube-system
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app: ebs-csi-controller
---
# ClusterResourceSet: applies the ConfigMap above to all clusters
# with label csi=external. strategy: ApplyOnce means no drift correction.
apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: ClusterResourceSet
metadata:
  name: aws-ebs-csi-driver
  namespace: default
spec:
  strategy: ApplyOnce
  clusterSelector:
    matchLabels:
      csi: external
  resources:
    - kind: ConfigMap
      name: aws-ebs-csi-driver-manifests
