# ConfigMap + ClusterResourceSet: AWS EBS CSI Driver
#
# The ConfigMap contains a single RKE2 HelmChart CR. When the ClusterResourceSet
# applies it to a workload cluster, RKE2's built-in Helm controller installs the
# upstream aws-ebs-csi-driver chart — no hand-maintained manifests needed.
#
# spec.bootstrap is NOT set (defaults false) — CSI can wait for normal scheduling;
# it does not need to run before nodes are fully registered.
#
# The ClusterResourceSet targets clusters with label csi=external.
# strategy: ApplyOnce delivers the HelmChart CR once; from that point RKE2's
# Helm controller takes over and continuously reconciles the release.
#
# NOTE: Both resources must be in the same namespace as the Cluster (default).
# NOTE: Requires clusterResourceSet: true on the CAPA CAPIProvider (set in capi-providers.yaml).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-ebs-csi-driver-manifests
  namespace: default
data:
  aws-ebs-csi-driver-helmchart.yaml: |
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: aws-ebs-csi-driver
      namespace: kube-system
    spec:
      repo: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      chart: aws-ebs-csi-driver
      version: "2.33.0"
      targetNamespace: kube-system
      valuesContent: |-
        controller:
          hostNetwork: true
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
        node:
          tolerations:
            - operator: Exists
              effect: NoSchedule
        storageClasses:
          - name: ebs-sc
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"
            volumeBindingMode: WaitForFirstConsumer
            reclaimPolicy: Delete
            parameters:
              type: gp3
---
# ClusterResourceSet: applies the ConfigMap above to all clusters
# with label csi=external. strategy: ApplyOnce delivers the HelmChart CR once;
# RKE2's Helm controller then reconciles the release continuously.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: aws-ebs-csi-driver
  namespace: default
spec:
  strategy: ApplyOnce
  clusterSelector:
    matchLabels:
      csi: external
  resources:
    - kind: ConfigMap
      name: aws-ebs-csi-driver-manifests
