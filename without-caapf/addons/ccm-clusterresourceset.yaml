# ConfigMap + ClusterResourceSet: AWS Cloud Controller Manager
#
# The ClusterResourceSet targets clusters with label ccm=external.
# strategy: ApplyOnce means it is deployed exactly once per cluster - no continuous
# reconciliation. This is the key behavioral difference from CAAPF HelmOps.
#
# NOTE: Both resources must be in the same namespace as the Cluster (default).
# NOTE: Requires clusterResourceSet: true on the CAPA CAPIProvider (set in capi-providers.yaml).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-ccm-crs-manifests
  namespace: default
data:
  aws-ccm.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: cloud-controller-manager
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: system:cloud-controller-manager
    rules:
    - apiGroups: [""]
      resources: [events]
      verbs: [create,patch,update]
    - apiGroups: [""]
      resources: [nodes]
      verbs: [get,list,update,delete,patch,watch]
    - apiGroups: [""]
      resources: [nodes/status]
      verbs: [patch]
    - apiGroups: [""]
      resources: [services]
      verbs: [list,watch,get,patch,update]
    - apiGroups: [""]
      resources: [services/status]
      verbs: [update,patch]
    - apiGroups: [""]
      resources: [serviceaccounts]
      verbs: [create,get,list,watch,update]
    - apiGroups: [""]
      resources: [persistentvolumes]
      verbs: [get,list,update,watch]
    - apiGroups: [""]
      resources: [endpoints]
      verbs: [create,get,list,watch,update]
    - apiGroups: [""]
      resources: [configmaps,secrets]
      verbs: [get,list,watch]
    - apiGroups: [coordination.k8s.io]
      resources: [leases]
      verbs: [create,get,list,update,watch]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: system:cloud-controller-manager
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:cloud-controller-manager
    subjects:
    - kind: ServiceAccount
      name: cloud-controller-manager
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: cloud-controller-manager:apiserver-authentication-reader
      namespace: kube-system
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: extension-apiserver-authentication-reader
    subjects:
    - kind: ServiceAccount
      name: cloud-controller-manager
      namespace: kube-system
    ---
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: aws-cloud-controller-manager
      namespace: kube-system
      labels:
        k8s-app: aws-cloud-controller-manager
    spec:
      selector:
        matchLabels:
          k8s-app: aws-cloud-controller-manager
      updateStrategy:
        type: RollingUpdate
      template:
        metadata:
          labels:
            k8s-app: aws-cloud-controller-manager
        spec:
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
          - key: node.cloudprovider.kubernetes.io/uninitialized
            value: "true"
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          serviceAccountName: cloud-controller-manager
          hostNetwork: true
          priorityClassName: system-cluster-critical
          containers:
          - name: aws-cloud-controller-manager
            image: registry.k8s.io/provider-aws/cloud-controller-manager:v1.30.1
            args: [--v=2,--cloud-provider=aws,--configure-cloud-routes=false]
            resources:
              requests:
                cpu: 200m
---
# ClusterResourceSet: applies the ConfigMap above to all clusters
# with label ccm=external. strategy: ApplyOnce means no drift correction.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: aws-ccm
  namespace: default
spec:
  strategy: ApplyOnce
  clusterSelector:
    matchLabels:
      ccm: external
  resources:
    - kind: ConfigMap
      name: aws-ccm-crs-manifests
