# ConfigMap + ClusterResourceSet: AWS Cloud Controller Manager
#
# The ConfigMap contains a single RKE2 HelmChart CR. When the ClusterResourceSet
# applies it to a workload cluster, RKE2's built-in Helm controller installs the
# upstream aws-cloud-controller-manager chart — no hand-maintained manifests needed.
#
# spec.bootstrap: true ensures CCM installs before nodes are fully registered,
# which is required because uninitialized nodes carry the
# node.cloudprovider.kubernetes.io/uninitialized taint.
#
# The ClusterResourceSet targets clusters with label ccm=external.
# strategy: ApplyOnce delivers the HelmChart CR once; from that point RKE2's
# Helm controller takes over and continuously reconciles the release.
#
# NOTE: Both resources must be in the same namespace as the Cluster (default).
# NOTE: Requires clusterResourceSet: true on the CAPA CAPIProvider (set in capi-providers.yaml).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-ccm-crs-manifests
  namespace: default
data:
  aws-ccm-helmchart.yaml: |
    apiVersion: helm.cattle.io/v1
    kind: HelmChart
    metadata:
      name: aws-cloud-controller-manager
      namespace: kube-system
    spec:
      repo: https://kubernetes.github.io/cloud-provider-aws
      chart: aws-cloud-controller-manager
      version: "0.0.8"
      targetNamespace: kube-system
      bootstrap: true
      valuesContent: |-
        nodeSelector:
          node-role.kubernetes.io/control-plane: "true"
        tolerations:
          - key: node.cloudprovider.kubernetes.io/uninitialized
            value: "true"
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
        args:
          - --v=2
          - --cloud-provider=aws
          - --configure-cloud-routes=false
        hostNetworking: true
---
# ClusterResourceSet: applies the ConfigMap above to all clusters
# with label ccm=external. strategy: ApplyOnce delivers the HelmChart CR once;
# RKE2's Helm controller then reconciles the release continuously.
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: aws-ccm
  namespace: default
spec:
  strategy: ApplyOnce
  clusterSelector:
    matchLabels:
      ccm: external
  resources:
    - kind: ConfigMap
      name: aws-ccm-crs-manifests
